services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lendr}
    volumes:
      - lendr_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-lendr}
      TZ: Asia/Manila
      AUTH_TRUST_PROXY_HEADERS: "true"
      AUTH_TRUSTED_PROXY_HOPS: "1"
      STARTUP_RUN_INITIALIZATION: "false"
      STARTUP_ENABLE_SCHEDULER: "true"
      STARTUP_FAIL_FAST_ON_SCHEDULER_ERROR: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    expose:
      - "8000"
    depends_on:
      - postgres
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    command: sh -c "npm run build && npm run start -- -p 3000"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/certificates:/etc/caddy/certificates:ro
      - caddy_data:/data
      - caddy_config:/config

  adminer:
    image: adminer:latest
    restart: unless-stopped
    profiles:
      - adminer
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  lendr_pgdata:
  caddy_data:
  caddy_config:
