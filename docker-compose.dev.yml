services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ${DEV_ENV_FILE:-.env.local}
    environment:
      TZ: ${TZ:-Asia/Manila}
      LOG_FILE_ENABLED: "true"
      STARTUP_RUN_INITIALIZATION: "true"
      STARTUP_ENABLE_SCHEDULER: "false"
      AUTH_TRUST_PROXY_HEADERS: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - shared
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - export DATABASE_URL="postgresql+psycopg2://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@powergold-db:5432/$${POSTGRES_DB}" && uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - shared
    depends_on:
      backend:
        condition: service_started
    command:
      - npx
      - next
      - dev
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
