name: powergold-dev

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      TZ: ${TZ:-Asia/Manila}
    ports:
      - "5433:5432"
    volumes:
      - powergold_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  adminer:
    image: adminer:4.8.1-standalone
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      TZ: ${TZ:-Asia/Manila}
      LOG_FILE_ENABLED: "true"
      STARTUP_RUN_INITIALIZATION: "true"
      STARTUP_ENABLE_SCHEDULER: "false"
      AUTH_TRUST_PROXY_HEADERS: "false"
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  powergold_dev_pgdata:
